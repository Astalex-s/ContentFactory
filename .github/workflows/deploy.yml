name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Build Docker Images"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  check-build:
    name: Check Build Status
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main'
    
    steps:
      - name: Check build workflow result
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "Build workflow failed, skipping deployment"
          exit 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    # Только при workflow_run — если Build завершён на main. Ручной deploy и теги — всегда.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_PUBLIC_URL: ${{ secrets.S3_PUBLIC_URL }}
          S3_PRESIGNED_EXPIRE: ${{ secrets.S3_PRESIGNED_EXPIRE }}
        run: |
          GHCR_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ssh -i ~/.ssh/deploy_key -p $SSH_PORT $SSH_USER@$SSH_HOST "GHCR_OWNER=$GHCR_OWNER_LOWER bash -s" << ENDSSH
            set -e
            
            echo "=== Navigating to deployment directory ==="
            cd ${{ secrets.DEPLOY_PATH }}
            
            echo "=== Checking git repository ==="
            if [ ! -d .git ]; then
              echo "ERROR: Not a git repository. Run on server:"
              echo "  mkdir -p ${{ secrets.DEPLOY_PATH }}"
              echo "  cd ${{ secrets.DEPLOY_PATH }}"
              echo "  git clone https://github.com/${{ github.repository }}.git ."
              echo "  cp .env.example .env && nano .env"
              exit 1
            fi
            
            echo "=== Checking .env file ==="
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found in ${{ secrets.DEPLOY_PATH }}"
              echo "Create .env from .env.example and fill POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB"
              exit 1
            fi
            if ! grep -qE '^POSTGRES_PASSWORD=.+' .env 2>/dev/null; then
              echo "ERROR: POSTGRES_PASSWORD is empty or missing in .env"
              exit 1
            fi
            if ! grep -qE '^POSTGRES_USER=.+' .env 2>/dev/null; then
              echo "ERROR: POSTGRES_USER is empty or missing in .env"
              exit 1
            fi
            if ! grep -qE '^POSTGRES_DB=.+' .env 2>/dev/null; then
              echo "ERROR: POSTGRES_DB is empty or missing in .env"
              exit 1
            fi
            echo ".env OK"
            
            echo "=== Setting GHCR_OWNER (lowercase for Docker) ==="
            echo "GHCR_OWNER=$GHCR_OWNER"
            
            echo "=== Pulling latest changes ==="
            git fetch origin
            git checkout main
            git reset --hard origin/main
            
            echo "=== Pulling Docker images ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env pull
            
            echo "=== Stopping services ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env down
            
            echo "=== Updating .env with S3 secrets (if provided) ==="
            if [ -n "$S3_ACCESS_KEY_ID" ] && [ -n "$S3_BUCKET" ]; then
              if [ -f .env ]; then
                grep -v '^STORAGE_BACKEND=' .env | grep -v '^S3_' > .env.tmp || true
                if [ -s .env.tmp ]; then mv .env.tmp .env; else rm -f .env.tmp; fi
              fi
              {
                echo ""
                echo "# S3 storage (injected by deploy)"
                echo "STORAGE_BACKEND=s3"
                echo "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID"
                echo "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY"
                echo "S3_BUCKET=$S3_BUCKET"
                [ -n "$S3_REGION" ] && echo "S3_REGION=$S3_REGION"
                [ -n "$S3_ENDPOINT_URL" ] && echo "S3_ENDPOINT_URL=$S3_ENDPOINT_URL"
                [ -n "$S3_PUBLIC_URL" ] && echo "S3_PUBLIC_URL=$S3_PUBLIC_URL"
                [ -n "$S3_PRESIGNED_EXPIRE" ] && echo "S3_PRESIGNED_EXPIRE=$S3_PRESIGNED_EXPIRE"
              } >> .env
              echo "S3 variables added to .env"
            else
              echo "S3 secrets not set, skipping .env update"
            fi
            
            echo "=== Starting services ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env up -d
            
            echo "=== Waiting for backend to be ready ==="
            sleep 10
            
            echo "=== Running database migrations ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env exec -T backend alembic upgrade head
            
            echo "=== Checking service health ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env ps
            
            echo "=== Deployment completed successfully ==="
          ENDSSH
      
      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $SSH_PORT $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd ${{ secrets.DEPLOY_PATH }}
            
            echo "=== Container status ==="
            docker compose -f docker-compose.prod.yml ps
            
            echo "=== Recent backend logs ==="
            docker compose -f docker-compose.prod.yml logs --tail=50 backend
            
            echo "=== Health check ==="
            curl -f http://localhost:8000/health || echo "Health check failed"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  deploy-notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment result
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "Deployment to ${{ github.event.inputs.environment || 'production' }} completed successfully"
          else
            echo "Deployment to ${{ github.event.inputs.environment || 'production' }} failed"
            exit 1
          fi
