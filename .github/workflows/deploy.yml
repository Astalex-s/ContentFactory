name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Build Docker Images"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  check-build:
    name: Check Build Status
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main'
    
    steps:
      - name: Check build workflow result
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "Build workflow failed, skipping deployment"
          exit 1

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    # Только при workflow_run — если Build завершён на main. Ручной deploy и теги — всегда.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_PUBLIC_URL: ${{ secrets.S3_PUBLIC_URL }}
          S3_PRESIGNED_EXPIRE: ${{ secrets.S3_PRESIGNED_EXPIRE }}
        run: |
          GHCR_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for attempt in 1 2 3; do
            if ssh -o ConnectTimeout=30 -o ServerAliveInterval=10 -i ~/.ssh/deploy_key -p $SSH_PORT $SSH_USER@$SSH_HOST "GHCR_OWNER='$GHCR_OWNER' GHCR_TOKEN='${GHCR_TOKEN:-}' DEPLOY_PATH='$DEPLOY_PATH' bash -s" << 'ENDSSH'
            set -e
            
            echo "=== Navigating to deployment directory ==="
            cd "$DEPLOY_PATH"
            
            echo "=== Checking git repository ==="
            if [ ! -d .git ]; then
              echo "ERROR: Not a git repository. Run on server:"
              echo "  mkdir -p $DEPLOY_PATH"
              echo "  cd $DEPLOY_PATH"
              echo "  git clone https://github.com/${{ github.repository }}.git ."
              echo "  cp .env.example .env && nano .env"
              exit 1
            fi
            
            echo "=== Checking .env file ==="
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found in $DEPLOY_PATH"
              echo "Create .env from .env.example and fill POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB"
              exit 1
            fi
            if ! grep -qE '^POSTGRES_PASSWORD=.+' .env 2>/dev/null; then
              echo "ERROR: POSTGRES_PASSWORD is empty or missing in .env"
              exit 1
            fi
            if ! grep -qE '^POSTGRES_USER=.+' .env 2>/dev/null; then
              echo "ERROR: POSTGRES_USER is empty or missing in .env"
              exit 1
            fi
            if ! grep -qE '^POSTGRES_DB=.+' .env 2>/dev/null; then
              echo "ERROR: POSTGRES_DB is empty or missing in .env"
              exit 1
            fi
            echo ".env OK"
            
            echo "=== Setting GHCR_OWNER (lowercase for Docker) ==="
            echo "GHCR_OWNER=$GHCR_OWNER"
            if ! grep -qE '^GHCR_OWNER=' .env 2>/dev/null; then
              echo "GHCR_OWNER=$GHCR_OWNER" >> .env
              echo "GHCR_OWNER added to .env"
            fi
            
            echo "=== Pulling latest changes ==="
            git fetch origin
            git checkout main
            git reset --hard origin/main
            
            echo "=== Stopping services (before pull) ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env down || true
            
            echo "=== Logging in to GHCR (if GHCR_TOKEN set) ==="
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin
              echo "GHCR login OK"
            else
              echo "GHCR_TOKEN not set — skipping login (OK if images are public)"
            fi
            
            echo "=== Pulling Docker images ==="
            # Исправление "lease does not exist: not found" — очистка stale-ссылок перед pull
            docker system prune -f 2>/dev/null || true
            docker rmi ghcr.io/$GHCR_OWNER/contentfactory-backend:latest 2>/dev/null || true
            docker rmi ghcr.io/$GHCR_OWNER/contentfactory-frontend:latest 2>/dev/null || true
            if ! GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env pull; then
              echo "WARNING: docker compose pull failed. Trying build on server..."
              GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env build --no-cache
            fi
            
            echo "=== Updating .env with APP_DOMAIN (if provided) ==="
            if [ -n "$APP_DOMAIN" ]; then
              DOMAIN=$(echo "$APP_DOMAIN" | sed 's|^https\?://||' | sed 's|/.*||')
              BASE="https://$DOMAIN"
              grep -v -E '^(API_BASE_URL|FRONTEND_URL|CORS_ORIGINS)=' .env > .env.tmp 2>/dev/null || true
              [ -s .env.tmp ] && mv .env.tmp .env || rm -f .env.tmp
              {
                echo ""
                echo "# Domain (injected by deploy from APP_DOMAIN secret)"
                echo "API_BASE_URL=${BASE}/api"
                echo "FRONTEND_URL=${BASE}"
                echo "CORS_ORIGINS=${BASE}"
              } >> .env
              echo "APP_DOMAIN=$APP_DOMAIN -> API_BASE_URL, FRONTEND_URL, CORS_ORIGINS updated"
            fi
            
            echo "=== Starting Postgres only (for migrations) ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env up -d postgres
            
            echo "=== Waiting for Postgres ==="
            for i in $(seq 1 12); do
              if GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env exec -T postgres sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"' 2>/dev/null; then
                echo "Postgres ready"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "ERROR: Postgres did not become ready"
                exit 1
              fi
              sleep 5
            done
            
            echo "=== Running database migrations ==="
            set +e
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env run --rm backend alembic upgrade head || {
              echo "Migration failed, attempting stamp head..."
              GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env run --rm backend alembic stamp head
              GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env run --rm backend alembic upgrade head
            }
            set -e
            echo "Migration step done, starting services..."
            
            echo "=== Updating .env with S3 secrets (if provided) ==="
            if [ -n "$S3_ACCESS_KEY_ID" ] && [ -n "$S3_BUCKET" ]; then
              if [ -f .env ]; then
                grep -v '^STORAGE_BACKEND=' .env | grep -v '^S3_' > .env.tmp || true
                if [ -s .env.tmp ]; then mv .env.tmp .env; else rm -f .env.tmp; fi
              fi
              {
                echo ""
                echo "# S3 storage (injected by deploy)"
                echo "STORAGE_BACKEND=s3"
                echo "S3_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID"
                echo "S3_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY"
                echo "S3_BUCKET=$S3_BUCKET"
                [ -n "$S3_REGION" ] && echo "S3_REGION=$S3_REGION"
                [ -n "$S3_ENDPOINT_URL" ] && echo "S3_ENDPOINT_URL=$S3_ENDPOINT_URL"
                [ -n "$S3_PUBLIC_URL" ] && echo "S3_PUBLIC_URL=$S3_PUBLIC_URL"
                [ -n "$S3_PRESIGNED_EXPIRE" ] && echo "S3_PRESIGNED_EXPIRE=$S3_PRESIGNED_EXPIRE"
              } >> .env
              echo "S3 variables added to .env"
            else
              echo "S3 secrets not set, skipping .env update"
            fi
            
            echo "=== Starting services ==="
            set +e
            for up_attempt in 1 2 3; do
              if GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env up -d --force-recreate; then
                echo "Containers started successfully"
                break
              fi
              if [ $up_attempt -eq 3 ]; then
                echo "ERROR: docker compose up -d failed after 3 attempts"
                GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env logs --tail=50
                exit 1
              fi
              echo "Retry $up_attempt failed, waiting 10s..."
              sleep 10
            done
            set -e
            
            echo "=== Pruning unused Docker images (free SSD space) ==="
            docker image prune -a -f 2>/dev/null || true
            
            echo "=== Waiting for backend to be ready ==="
            for i in $(seq 1 24); do
              status=$(GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env ps -q backend 2>/dev/null | xargs -I{} docker inspect -f '{{.State.Status}}' {} 2>/dev/null || echo "unknown")
              if [ "$status" = "running" ]; then
                if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
                  echo "Backend ready after $((i*10)) seconds"
                  break
                fi
              fi
              if [ $i -eq 24 ]; then
                echo "ERROR: Backend did not become ready in 120 seconds. Logs:"
                GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env logs --tail=100 backend
                exit 1
              fi
              sleep 10
            done
            
            echo "=== Checking service health ==="
            GHCR_OWNER="$GHCR_OWNER" docker compose -f docker-compose.prod.yml --env-file .env ps
            
            echo "=== Installing systemd service (auto-start on boot) ==="
            SVC="/etc/systemd/system/contentfactory.service"
            if [ -w /etc/systemd/system ] 2>/dev/null || [ "$(id -u)" = "0" ]; then
              sed "s|__DEPLOY_PATH__|$DEPLOY_PATH|g" deploy/contentfactory.service > "$SVC" 2>/dev/null || true
              if [ -f "$SVC" ]; then
                systemctl daemon-reload 2>/dev/null || true
                systemctl enable contentfactory.service 2>/dev/null || true
                echo "contentfactory.service enabled for boot"
              fi
            else
              echo "NOTE: Run as root to enable auto-start: sudo cp deploy/contentfactory.service /etc/systemd/system/ && sudo sed -i 's|__DEPLOY_PATH__|$DEPLOY_PATH|g' /etc/systemd/system/contentfactory.service && sudo systemctl daemon-reload && sudo systemctl enable contentfactory"
            fi
            
            echo "=== Installing cron for publication queue ==="
            CRON1="* * * * * curl -sS -X POST http://127.0.0.1:8000/publish/process-pending"
            CRON2="* * * * * curl -sS -X POST http://127.0.0.1:8000/publish/auto-publish-check"
            TMP=$(mktemp)
            crontab -l 2>/dev/null | grep -v "publish/process-pending" | grep -v "publish/auto-publish-check" > "$TMP" || true
            echo "$CRON1" >> "$TMP"
            echo "$CRON2" >> "$TMP"
            if crontab "$TMP" 2>/dev/null; then
              rm -f "$TMP"
              echo "Cron installed: process-pending, auto-publish-check (every minute)"
            else
              rm -f "$TMP"
              echo "NOTE: Crontab failed (run manually): crontab -e and add:"
              echo "  $CRON1"
              echo "  $CRON2"
            fi
            
            echo "=== Deployment completed successfully ==="
          ENDSSH
            then
              break
            fi
            if [ $attempt -eq 3 ]; then
              echo "ERROR: SSH failed after 3 attempts (kex_exchange_identification/connection reset)"
              exit 1
            fi
            echo "SSH attempt $attempt failed, retrying in 15s..."
            sleep 15
          done
      
      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          ssh -o ConnectTimeout=30 -i ~/.ssh/deploy_key -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $DEPLOY_PATH && GHCR_OWNER=$GHCR_OWNER docker compose -f docker-compose.prod.yml ps && GHCR_OWNER=$GHCR_OWNER docker compose -f docker-compose.prod.yml logs --tail=50 backend && curl -f http://localhost:8000/health || echo 'Health check failed'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  deploy-notification:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment result
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "Deployment to ${{ github.event.inputs.environment || 'production' }} completed successfully"
          else
            echo "Deployment to ${{ github.event.inputs.environment || 'production' }} failed"
            exit 1
          fi
