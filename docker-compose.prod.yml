# ContentFactory — Docker Compose (Production)
# Uses pre-built images from ghcr.io (built by CI/CD).
# No pgadmin, no ssl-proxy dev service, no source mounts.
#
# Setup:
#   1. cp .env.example .env && edit .env (set real credentials)
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16
    container_name: contentfactory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_OWNER:-contentfactory}/contentfactory-backend:${IMAGE_TAG:-latest}
    container_name: contentfactory-backend
    restart: unless-stopped
    volumes:
      - media_data:/app/media
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      # AI
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT: ${AI_TIMEOUT:-60}
      # Replicate
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-replicate}
      REPLICATE_DELAY_SECONDS: ${REPLICATE_DELAY_SECONDS:-15}
      REPLICATE_IMAGE_MODEL: ${REPLICATE_IMAGE_MODEL:-black-forest-labs/flux-kontext-pro}
      REPLICATE_VIDEO_MODEL: ${REPLICATE_VIDEO_MODEL:-wan-video/wan-2.2-i2v-fast}
      REPLICATE_VIDEO_DURATION: ${REPLICATE_VIDEO_DURATION:-6}
      CONTENT_GENERATE_RATE_LIMIT: ${CONTENT_GENERATE_RATE_LIMIT:-10/minute}
      # Storage
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MEDIA_BASE_PATH: /app/media
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_PRESIGNED_EXPIRE: ${S3_PRESIGNED_EXPIRE:-3600}
      # OAuth
      OAUTH_SECRET_KEY: ${OAUTH_SECRET_KEY}
      OAUTH_ENCRYPTION_SALT: ${OAUTH_ENCRYPTION_SALT}
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-00000000-0000-0000-0000-000000000001}
      API_BASE_URL: ${API_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SOCIAL_TIMEOUT: ${SOCIAL_TIMEOUT:-60}
      # VK
      VK_SERVICE_KEY: ${VK_SERVICE_KEY:-}
      VK_GROUP_ID: ${VK_GROUP_ID:-}
      VK_COMMUNITY_TOKEN: ${VK_COMMUNITY_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/${GHCR_OWNER:-contentfactory}/contentfactory-frontend:${IMAGE_TAG:-latest}
    container_name: contentfactory-frontend
    restart: unless-stopped
    ports:
      - "80:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
