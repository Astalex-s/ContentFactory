# ContentFactory — Docker Compose (Production)
# Uses pre-built images from ghcr.io (built by CI/CD).
# SSL — host nginx с Let's Encrypt (см. nginx-ssl-host.conf.example).
# Порты 8000 и 5173 — только localhost, host nginx проксирует.
#
# Требуется .env (env_file: .env). Без него docker compose up завершится с ошибкой.
#
# Setup:
#   1. cp .env.example .env && edit .env (GHCR_OWNER=ваш-github-username)
#   2. Проверить: REPLICATE_VIDEO_SEGMENTS=5, REPLICATE_VIDEO_SEGMENT_DURATION=5, TTS_PROVIDER=openai
#   3. docker compose -f docker-compose.prod.yml --env-file .env pull
#   4. docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16
    container_name: contentfactory-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_OWNER:-contentfactory}/contentfactory-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contentfactory-backend
    restart: always
    env_file:
      - .env
    volumes:
      - media_data:/app/media
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ENVIRONMENT: production
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      # AI
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT: ${AI_TIMEOUT:-60}
      # Replicate
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-replicate}
      REPLICATE_DELAY_SECONDS: ${REPLICATE_DELAY_SECONDS:-15}
      REPLICATE_IMAGE_MODEL: ${REPLICATE_IMAGE_MODEL:-black-forest-labs/flux-kontext-pro}
      REPLICATE_VIDEO_MODEL: ${REPLICATE_VIDEO_MODEL:-wan-video/wan-2.2-i2v-fast}
      REPLICATE_VIDEO_DURATION: ${REPLICATE_VIDEO_DURATION:-6}
      REPLICATE_VIDEO_SEGMENTS: ${REPLICATE_VIDEO_SEGMENTS:-1}
      REPLICATE_VIDEO_SEGMENT_DURATION: ${REPLICATE_VIDEO_SEGMENT_DURATION:-5}
      TTS_PROVIDER: ${TTS_PROVIDER:-}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      CONTENT_GENERATE_RATE_LIMIT: ${CONTENT_GENERATE_RATE_LIMIT:-10/minute}
      # Storage
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MEDIA_BASE_PATH: /app/media
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_PRESIGNED_EXPIRE: ${S3_PRESIGNED_EXPIRE:-3600}
      # OAuth
      OAUTH_SECRET_KEY: ${OAUTH_SECRET_KEY}
      OAUTH_ENCRYPTION_SALT: ${OAUTH_ENCRYPTION_SALT}
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-00000000-0000-0000-0000-000000000001}
      API_BASE_URL: ${API_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      SOCIAL_TIMEOUT: ${SOCIAL_TIMEOUT:-60}
      # VK
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ghcr.io/${GHCR_OWNER:-contentfactory}/contentfactory-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: contentfactory-frontend
    restart: always
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
