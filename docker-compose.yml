# ContentFactory — Docker Compose
# docker compose build && docker compose up -d
# PGAdmin: http://localhost:5050

services:
  postgres:
    image: postgres:16
    container_name: contentfactory-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contentfactory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contentfactory}
      POSTGRES_DB: ${POSTGRES_DB:-contentfactory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentfactory} -d ${POSTGRES_DB:-contentfactory}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contentfactory-backend
    volumes:
      - media_data:/app/media
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contentfactory}:${POSTGRES_PASSWORD:-contentfactory}@postgres:5432/${POSTGRES_DB:-contentfactory}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini-2025-08-07}
      AI_TIMEOUT: ${AI_TIMEOUT:-60}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-replicate}
      REPLICATE_DELAY_SECONDS: ${REPLICATE_DELAY_SECONDS:-15}
      REPLICATE_IMAGE_MODEL: ${REPLICATE_IMAGE_MODEL:-stability-ai/stable-diffusion-img2img:15a3689ee13b0d2616e98820eca31d4c3abcd36672df6afce5cb6feb1d66087d}
      REPLICATE_VIDEO_MODEL: ${REPLICATE_VIDEO_MODEL:-wan-video/wan-2.2-i2v-fast:febae7d9656309cf8c5df4842b27ae4768c0e47a0e1ce443a5ae81f896956134}
      REPLICATE_VIDEO_DURATION: ${REPLICATE_VIDEO_DURATION:-6}
      CONTENT_GENERATE_RATE_LIMIT: ${CONTENT_GENERATE_RATE_LIMIT:-10/minute}
      OAUTH_SECRET_KEY: ${OAUTH_SECRET_KEY:-}
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-00000000-0000-0000-0000-000000000001}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      VK_CLIENT_ID: ${VK_CLIENT_ID:-}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET:-}
      RUTUBE_CLIENT_ID: ${RUTUBE_CLIENT_ID:-}
      RUTUBE_CLIENT_SECRET: ${RUTUBE_CLIENT_SECRET:-}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: contentfactory-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: contentfactory-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
  media_data:
