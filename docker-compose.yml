# ContentFactory — Docker Compose (Development)
# docker compose build && docker compose up -d
# PGAdmin: http://localhost:5050

services:
  postgres:
    image: postgres:16
    container_name: contentfactory-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contentfactory-backend
    volumes:
      - ./backend/app:/app/app
      - media_data:/app/media
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # AI
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT: ${AI_TIMEOUT:-60}
      # Replicate
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      IMAGE_PROVIDER: ${IMAGE_PROVIDER:-replicate}
      REPLICATE_DELAY_SECONDS: ${REPLICATE_DELAY_SECONDS:-15}
      REPLICATE_IMAGE_MODEL: ${REPLICATE_IMAGE_MODEL:-black-forest-labs/flux-kontext-pro}
      REPLICATE_VIDEO_MODEL: ${REPLICATE_VIDEO_MODEL:-wan-video/wan-2.2-i2v-fast}
      REPLICATE_VIDEO_DURATION: ${REPLICATE_VIDEO_DURATION:-6}
      CONTENT_GENERATE_RATE_LIMIT: ${CONTENT_GENERATE_RATE_LIMIT:-10/minute}
      # Storage
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MEDIA_BASE_PATH: /app/media
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_PRESIGNED_EXPIRE: ${S3_PRESIGNED_EXPIRE:-3600}
      # OAuth & Social
      OAUTH_SECRET_KEY: ${OAUTH_SECRET_KEY:-}
      OAUTH_ENCRYPTION_SALT: ${OAUTH_ENCRYPTION_SALT:-}
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-00000000-0000-0000-0000-000000000001}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SOCIAL_TIMEOUT: ${SOCIAL_TIMEOUT:-60}
      # VK
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: contentfactory-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ssl-proxy:
    image: nginx:alpine
    container_name: contentfactory-ssl-proxy
    ports:
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - ssl

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: contentfactory-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    profiles:
      - dev-tools

volumes:
  postgres_data:
  pgadmin_data:
  media_data:
